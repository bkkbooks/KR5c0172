body:
  text: 眞武靈應眞君增上佑聖尊號冊文維大觀二年歲次戊子三月辛亥朔二十四日甲戌皇帝謹再拜言曰惟皇上帝孚佑下民統鎮北方有大神將至眞示化緑感而通盛德隂功萬邦永頼恭惟眞武靈應眞君應虚危之次合龜虵之形道德妙於難名威靈攝於萬有周行六合洞察無形祚善刑淫庇護羣品國家誕膺寳命百五十年肆及眇躬嗣承丕緒欲無不獲爲無不成神人底寧海寓静謐妖孽不作嘉祥荐臻太平之休厥爲熈盛非神茂迪曷濟登茲冝進微稱式示昭荅謹遣朝散郎試吏部尚書兼侍讀實録修撰賜紫金魚袋余深奉冊增上尊號曰佑聖眞武靈應眞君夫惟秉籙實典神天作民恭先其在隆禮情著於内備文以行尚冀眷昭俯埀貺祉謹言眞武靈應眞君增上佑聖尊號冊文
